<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Folha de Pagamento</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body style="margin: 0; min-height: 100vh; background: #f0f2f5; display: flex; align-items: center; justify-content: center; padding: 2rem; font-family: 'Segoe UI', Arial, sans-serif;">

  <div style="background: white; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.10); width: 100%; max-width: 480px; overflow: hidden;">

    <div style="background: #1a1a2e; padding: 1.25rem 1.5rem; display: flex; align-items: center; justify-content: space-between;">
      <span style="color: white; font-size: 14px; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase;">Sistema de Folha de Pagamento</span>
      <div style="width: 28px; height: 28px; border-radius: 50%; background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; cursor: pointer;">
        <i class="ti ti-x" style="color: white; font-size: 14px;"></i>
      </div>
    </div>

    <div style="padding: 2rem 1.75rem 1.5rem;">

      <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem;">
        <div style="width: 44px; height: 44px; border-radius: 50%; background: #fdecea; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
          <i class="ti ti-alert-triangle" style="color: #c0392b; font-size: 22px;"></i>
        </div>
        <div>
          <p style="margin: 0; font-size: 16px; font-weight: 600; color: #1a1a2e;">Confirmar exclusão</p>
          <p style="margin: 0; font-size: 13px; color: #888;">Esta ação não poderá ser desfeita</p>
        </div>
      </div>

      <div style="background: #f8f9fa; border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 1.5rem; border: 1px solid #eee;">
        <p style="margin: 0 0 4px; font-size: 13px; color: #888;">Usuário selecionado</p>
        <p style="margin: 0; font-size: 15px; font-weight: 600; color: #1a1a2e;">Mateus Onival Araujo de Moraes</p>
        <p style="margin: 0; font-size: 13px; color: #555;">ID: 22402037 · Setor: Recursos Humanos</p>
      </div>

      <p style="font-size: 14px; color: #555; margin: 0 0 1.75rem; line-height: 1.6;">
        Tem certeza de que deseja apagar o registro deste usuário do sistema?
      </p>

      <div style="display: flex; gap: 10px;">
        <button style="flex: 1; padding: 11px; border-radius: 8px; border: 1.5px solid #ddd; background: white; color: #444; font-size: 14px; font-weight: 500; cursor: pointer;">
          Cancelar
        </button>
        <button style="flex: 1; padding: 11px; border-radius: 8px; border: none; background: #c0392b; color: white; font-size: 14px; font-weight: 500; cursor: pointer;">
          Confirmar exclusão
        </button>
      </div>

    </div>

  </div>

</body>
</html>
